remote_theme: mmistakes/minimal-mistakes@4.24.0

url: "https://thebeaverdam.github.io"
baseurl: ""

title: "The Beaver Dam"
name: "The Beaver Dam"
description: "High-quality DIY hardware, kits, and documentation."
logo: "/assets/images/logo.png"
locale: "en-US"
repository: "thebeaverdam/thebeaverdam.github.io"

# Author profile (sidebar)
author:
  name: "The Beaver Dam"
  avatar: "/assets/images/logo.png"
  bio: "Engineering open-source hardware, one branch at a time. 🦫"
  location: "Earth"
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/thebeaverdam"
    - label: "Lectronz Store"
      icon: "fas fa-fw fa-shopping-cart"
      url: "https://lectronz.com/stores/thebeaverdam"

# Footer links
footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/thebeaverdam"
    - label: "Lectronz Store"
      icon: "fas fa-fw fa-shopping-cart"
      url: "https://lectronz.com/stores/thebeaverdam"

plugins:
  - jekyll-feed
  - jekyll-gist
  - jekyll-remote-theme
  - jekyll-include-cache
  - jekyll-sitemap

collections:
  designs:
    output: true
    permalink: /designs/:name/
    sort_by: date

defaults:
  - scope:
      path: ""
    values:
      author_profile: true
      share: true
  - scope:
      path: ""
      type: "designs"
    values:
      layout: "single"
      author_profile: true
      share: true
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "single"
      author_profile: true
      share: true
      show_date: true